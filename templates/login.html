<!-- templates/login.html -->

<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Login | Intersync</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="glow glow1"></div>

<div class="glow glow2"></div>

<div class="login-box">

    <div class="logo">

        <i class="fa-solid fa-graduation-cap"></i>

        <h1>Intersync</h1>

        <p>Internship Tracker & Resume Analyzer</p>

    </div>

    <form method="POST"
          action="/login">

        <div class="input-box">

            <label>

                <i class="fa-solid fa-user me-2"></i>

                Username

            </label>

            <input type="text"
                   name="username"
                   placeholder="Enter username"
                   required>

        </div>

        <div class="input-box">

            <label>

                <i class="fa-solid fa-lock me-2"></i>

                Password

            </label>

            <input type="password"
                   name="password"
                   placeholder="Enter password"
                   required>

        </div>

        <button type="submit"
                class="login-btn">

            <i class="fa-solid fa-right-to-bracket me-2"></i>

            Login

        </button>

    </form>

    {% if error %}

    <div class="error-box">

        {{ error }}

    </div>

    {% endif %}

    <div class="bottom-text">

        Don't have an account?

        <a href="/register">

            Register Here

        </a>

    </div>

</div>

</body>

</html>
