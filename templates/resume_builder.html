<!-- templates/resume_builder.html -->

<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Resume Builder | Intersync</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark">

    <div class="container">

        <a class="navbar-brand"
           href="/">

            <i class="fa-solid fa-graduation-cap me-2"></i>

            Intersync

        </a>

    </div>

</nav>

<div class="main-box">

    <div class="title">

        <i class="fa-solid fa-file-lines"></i>

        <h1>Professional Resume Builder</h1>

        <p>

            Create a modern ATS-friendly resume instantly

        </p>

    </div>

    <form action="/generate-resume"
          method="POST">

        <div class="form-grid">

            <div class="section-label">

                <i class="fa-solid fa-user me-2"></i>

                Personal Information

            </div>

            <div class="field-group">

                <label>

                    Full Name *

                </label>

                <input type="text"
                       name="name"
                       required
                       placeholder="Enter your full name">

            </div>

            <div class="field-group">

                <label>

                    Email Address *

                </label>

                <input type="email"
                       name="email"
                       required
                       placeholder="example@email.com">

            </div>

            <div class="field-group">

                <label>

                    Phone Number *

                </label>

                <input type="text"
                       name="phone"
                       required
                       placeholder="+91 9876543210">

            </div>

            <div class="field-group">

                <label>

                    LinkedIn Profile

                </label>

                <input type="text"
                       name="linkedin"
                       placeholder="linkedin.com/in/username">

            </div>

            <div class="field-group">

                <label>

                    GitHub Profile

                </label>

                <input type="text"
                       name="github"
                       placeholder="github.com/username">

            </div>

            <div class="field-group">

                <label>

                    Languages Known

                </label>

                <input type="text"
                       name="languages"
                       placeholder="English, Hindi...">

            </div>

            <div class="section-label">

                <i class="fa-solid fa-code me-2"></i>

                Skills & Education

            </div>

            <div class="field-group full-width">

                <label>

                    Technical Skills *

                </label>

                <textarea name="skills"
                          required
                          placeholder="Python, Flask, HTML, CSS, JavaScript, SQL..."></textarea>

            </div>

            <div class="field-group full-width">

                <label>

                    Education *

                </label>

                <textarea name="education"
                          required
                          placeholder="B.Tech CSE - XYZ University"></textarea>

            </div>

            <div class="section-label">

                <i class="fa-solid fa-briefcase me-2"></i>

                Experience & Projects

            </div>

            <div class="field-group full-width">

                <label>

                    Internship Experience

                </label>

                <textarea name="internship"
                          placeholder="Describe your internship experience"></textarea>

            </div>

            <div class="field-group full-width">

                <label>

                    Projects

                </label>

                <textarea name="projects"
                          placeholder="Mention your projects"></textarea>

            </div>

            <div class="section-label">

                <i class="fa-solid fa-trophy me-2"></i>

                Achievements

            </div>

            <div class="field-group full-width">

                <label>

                    Achievements & Certifications

                </label>

                <textarea name="achievements"
                          placeholder="Certifications, achievements, hackathons..."></textarea>

            </div>

            <button type="submit"
                    class="generate-btn">

                <i class="fa-solid fa-download me-2"></i>

                Generate Resume

            </button>

        </div>

    </form>

    <a href="/"
       class="back-link">

        <i class="fa-solid fa-arrow-left me-2"></i>

        Back to Dashboard

    </a>

</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
